<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prins Resell - Premium Streetwear & Sneakers</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #0a0e27;
            color: white;
            overflow-x: hidden;
        }

        /* NAVBAR */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 60px;
            background: rgba(10, 14, 39, 0.95);
            backdrop-filter: blur(20px);
            z-index: 1000;
            box-shadow: 0 8px 32px rgba(255, 215, 0, 0.15);
            border-bottom: 1px solid rgba(255, 215, 0, 0.2);
        }

        .logo {
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 4px;
            text-decoration: none;
            animation: glow 3s ease-in-out infinite;
            text-transform: uppercase;
            font-style: italic;
        }

        @keyframes glow {
            0%, 100% { filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.4)); }
            50% { filter: drop-shadow(0 0 25px rgba(255, 215, 0, 0.8)); }
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 50px;
            align-items: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: 600;
            position: relative;
            padding: 8px 0;
            font-size: 15px;
            letter-spacing: 1px;
            transition: 0.3s ease;
            text-transform: uppercase;
        }

        nav a::before {
            content: "";
            position: absolute;
            width: 0;
            height: 3px;
            background: linear-gradient(90deg, #FFD700, #FFA500);
            bottom: -5px;
            left: 0;
            transition: 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        nav a:hover {
            color: #FFD700;
        }

        nav a:hover::before {
            width: 100%;
        }

        /* HERO SECTION */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            overflow: hidden;
            margin-top: 70px;
        }

        .hero::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(255, 215, 0, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 165, 0, 0.1) 0%, transparent 50%),
                linear-gradient(135deg, #0a0e27 0%, #1a1a3e 100%);
            z-index: 0;
        }

        .hero-content {
            position: relative;
            z-index: 1;
            animation: fadeInUp 1s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(60px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero h1 {
            font-size: 120px;
            font-weight: 900;
            background: linear-gradient(135deg, #FFD700, #FFA500, #FF6B6B);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 8px;
            margin-bottom: 30px;
            text-transform: uppercase;
            text-shadow: 0 0 60px rgba(255, 215, 0, 0.2);
            animation: slideDown 1s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero p {
            font-size: 24px;
            margin-bottom: 60px;
            opacity: 0.8;
            letter-spacing: 2px;
            font-weight: 300;
            animation: fadeInUp 1s ease-out 0.2s both;
            text-transform: uppercase;
        }

        .hero-buttons {
            animation: fadeInUp 1s ease-out 0.4s both;
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-primary {
            padding: 20px 70px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #000;
            text-decoration: none;
            font-weight: 900;
            border-radius: 50px;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            cursor: pointer;
            border: none;
            font-size: 16px;
            letter-spacing: 2px;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(255, 215, 0, 0.3);
        }

        .btn-primary::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.3);
            transition: 0.4s;
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 20px 60px rgba(255, 215, 0, 0.5);
        }

        .btn-secondary {
            padding: 20px 70px;
            background: transparent;
            color: #FFD700;
            text-decoration: none;
            font-weight: 900;
            border: 2px solid #FFD700;
            border-radius: 50px;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            cursor: pointer;
            font-size: 16px;
            letter-spacing: 2px;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(255, 215, 0, 0.1);
        }

        .btn-secondary::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: #FFD700;
            z-index: -1;
            transition: 0.4s;
        }

        .btn-secondary:hover::before {
            left: 0;
        }

        .btn-secondary:hover {
            color: #000;
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 20px 60px rgba(255, 215, 0, 0.4);
        }

        /* SCROLL INDICATOR */
        .scroll-indicator {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateX(-50%) translateY(0);
            }
            40% {
                transform: translateX(-50%) translateY(10px);
            }
            60% {
                transform: translateX(-50%) translateY(5px);
            }
        }

        .scroll-indicator svg {
            width: 30px;
            height: 30px;
            stroke: #FFD700;
            fill: none;
            stroke-width: 2;
        }

        /* FOOTER */
        footer {
            padding: 40px;
            text-align: center;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 100%);
            border-top: 1px solid rgba(255, 215, 0, 0.2);
        }

        footer p {
            font-size: 14px;
            color: #FFD700;
            letter-spacing: 2px;
            font-weight: 600;
        }

        /* RESPONSIVE */
        @media (max-width: 1024px) {
            nav {
                padding: 20px 40px;
            }

            .logo {
                font-size: 22px;
            }

            nav ul {
                gap: 30px;
            }

            .hero h1 {
                font-size: 70px;
            }

            .hero p {
                font-size: 18px;
            }

            .btn-primary, .btn-secondary {
                padding: 15px 50px;
                font-size: 14px;
            }
        }

        @media (max-width: 768px) {
            nav {
                flex-wrap: wrap;
                gap: 20px;
                padding: 15px 20px;
            }

            .logo {
                font-size: 18px;
                width: 100%;
            }

            nav ul {
                width: 100%;
                gap: 15px;
                justify-content: center;
            }

            nav a {
                font-size: 12px;
            }

            .hero {
                margin-top: 50px;
            }

            .hero h1 {
                font-size: 40px;
                letter-spacing: 4px;
            }

            .hero p {
                font-size: 14px;
            }

            .hero-buttons {
                flex-direction: column;
                gap: 15px;
            }

            .btn-primary, .btn-secondary {
                padding: 15px 40px;
                width: 90%;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">Prins Resell</a>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="shop.html">Shop</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <section class="hero">
        <div class="hero-content">
            <h1>PRINS RESELL</h1>
            <p>Exclusive items. Real deals. No fake.</p>
            <div class="hero-buttons">
                <a href="shop.html" class="btn-primary">🔥 Enter Store</a>
                <a href="contact.html" class="btn-secondary">📞 Contact</a>
            </div>
        </div>
        <div class="scroll-indicator">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 5v10M7 10l5 5 5-5" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
        </div>
    </section>

    <footer>
        <p>&copy; 2024 Prins Resell. Alle rechten voorbehouden.</p>
    </footer>

</body>
</html>
