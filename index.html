<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prins Resell</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#000;color:#fff;overflow-x:hidden;}

/* NAVBAR */
nav{
position:fixed;width:100%;
display:flex;justify-content:space-between;
align-items:center;
padding:20px 50px;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(10px);
z-index:1000;
}

/* LOGO */
.logo{
height:45px;
opacity:0;
transform:translateY(-20px) scale(0.9);
animation:logoFade 1.2s ease forwards, floatLogo 3s ease-in-out infinite;
transition:0.3s;
}
.logo:hover{
transform:scale(1.1);
filter:drop-shadow(0 0 10px gold);
}

/* NAV LINKS */
nav a{
color:#fff;margin-left:25px;text-decoration:none;position:relative;
}
nav a::after{
content:"";position:absolute;width:0;height:2px;background:gold;
left:0;bottom:-5px;transition:0.3s;
}
nav a:hover::after{width:100%;}

/* HERO */
.hero{
height:100vh;
background:url('https://images.unsplash.com/photo-1600185365926-3a2ce3cdb9eb') center/cover no-repeat;
display:flex;justify-content:center;align-items:center;text-align:center;
position:relative;
}
.hero::before{
content:"";position:absolute;width:100%;height:100%;
background:rgba(0,0,0,0.65);
}
.hero-content{position:relative;animation:fadeUp 1.5s ease;}
.hero h2{font-size:70px;letter-spacing:5px;}
.hero p{margin-top:20px;opacity:0.8;}

.btn{
margin-top:30px;padding:15px 40px;
background:gold;color:black;
text-decoration:none;font-weight:bold;
transition:0.3s;
}
.btn:hover{
transform:scale(1.1);
background:white;
}

/* SECTIONS */
.section{
padding:120px 40px;text-align:center;
opacity:0;transform:translateY(50px);
transition:1s;
}
.section.visible{
opacity:1;
transform:translateY(0);
}

footer{
padding:30px;
text-align:center;
color:gray;
}

/* ANIMATIONS */
@keyframes fadeUp{
from{opacity:0;transform:translateY(40px);}
to{opacity:1;transform:translateY(0);}
}

@keyframes logoFade{
to{
opacity:1;
transform:translateY(0) scale(1);
}
}

@keyframes floatLogo{
0%{transform:translateY(0);}
50%{transform:translateY(-5px);}
100%{transform:translateY(0);}
}
</style>
</head>

<body>

<nav>
<!-- PLAK HIER JE LOGO LINK -->
<img src="logo.png" class="logo">

<div>
<a href="#">Home</a>
<a href="#">Shop</a>
<a href="#">Contact</a>
</div>
</nav>

<section class="hero">
<div class="hero-content">
<h2>PRINS RESELL</h2>
<p>Exclusive items. Real deals. No fake.</p>
<a href="#" class="btn">ENTER STORE</a>
</div>
</section>

<section class="section">
<h2>Built for the Culture</h2>
<p>High-end streetwear & sneakers. Premium only.</p>
</section>

<section class="section">
<h2>Fast & Trusted</h2>
<p>Quick delivery. 100% authentic items.</p>
</section>

<footer>
Instagram: @prinsresell
</footer>

<script>
const sections=document.querySelectorAll('.section');
window.addEventListener('scroll',()=>{
sections.forEach(sec=>{
const top=sec.getBoundingClientRect().top;
if(top<window.innerHeight-100){
sec.classList.add('visible');
}
});
});
</script>

</body>
</html>
