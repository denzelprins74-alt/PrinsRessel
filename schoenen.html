<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schoenen - Prins Resell</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #0a0e27;
            color: white;
            overflow-x: hidden;
        }

        /* NAVBAR */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 60px;
            background: rgba(10, 14, 39, 0.95);
            backdrop-filter: blur(20px);
            z-index: 1000;
            box-shadow: 0 8px 32px rgba(255, 215, 0, 0.15);
            border-bottom: 1px solid rgba(255, 215, 0, 0.2);
        }

        .logo {
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 4px;
            text-decoration: none;
            animation: glow 3s ease-in-out infinite;
            text-transform: uppercase;
            font-style: italic;
        }

        @keyframes glow {
            0%, 100% { filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.4)); }
            50% { filter: drop-shadow(0 0 25px rgba(255, 215, 0, 0.8)); }
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 50px;
            align-items: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: 600;
            position: relative;
            padding: 8px 0;
            font-size: 15px;
            letter-spacing: 1px;
            transition: 0.3s ease;
            text-transform: uppercase;
        }

        nav a::before {
            content: "";
            position: absolute;
            width: 0;
            height: 3px;
            background: linear-gradient(90deg, #FFD700, #FFA500);
            bottom: -5px;
            left: 0;
            transition: 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        nav a:hover {
            color: #FFD700;
        }

        nav a:hover::before {
            width: 100%;
        }

        /* CONTAINER */
        .container {
            margin-top: 150px;
            padding: 60px 40px;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
            min-height: calc(100vh - 150px);
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 60px;
        }

        .back-btn {
            padding: 12px 20px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #000;
            text-decoration: none;
            font-weight: 900;
            border-radius: 10px;
            transition: all 0.3s ease;
            display: inline-block;
            font-size: 14px;
            text-transform: uppercase;
        }

        .back-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.3);
        }

        h1 {
            font-size: 72px;
            font-weight: 900;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 4px;
            text-transform: uppercase;
            animation: fadeInDown 1s ease-out;
            margin: 0;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .empty-state {
            text-align: center;
            padding: 80px 40px;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.05), rgba(255, 165, 0, 0.05));
            border: 2px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            animation: fadeIn 1s ease-out 0.2s both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .empty-state-icon {
            font-size: 100px;
            margin-bottom: 30px;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .empty-state p {
            font-size: 24px;
            color: #FFD700;
            margin: 20px 0;
            letter-spacing: 2px;
            font-weight: 600;
        }

        .empty-state p:last-child {
            font-size: 16px;
            color: #FFA500;
            opacity: 0.8;
        }

        /* FOOTER */
        footer {
            padding: 40px;
            text-align: center;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 100%);
            border-top: 1px solid rgba(255, 215, 0, 0.2);
            margin-top: 100px;
        }

        footer p {
            font-size: 14px;
            color: #FFD700;
            letter-spacing: 2px;
            font-weight: 600;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            nav {
                flex-wrap: wrap;
                gap: 20px;
                padding: 15px 20px;
            }

            .logo {
                font-size: 18px;
                width: 100%;
            }

            nav ul {
                width: 100%;
                gap: 15px;
                justify-content: center;
            }

            nav a {
                font-size: 12px;
            }

            .container {
                margin-top: 120px;
                padding: 30px 15px;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
                margin-bottom: 40px;
            }

            h1 {
                font-size: 40px;
            }

            .empty-state {
                padding: 50px 20px;
            }

            .empty-state-icon {
                font-size: 70px;
                margin-bottom: 20px;
            }

            .empty-state p {
                font-size: 18px;
            }

            .empty-state p:last-child {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">Prins Resell</a>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="shop.html">Shop</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="header">
            <a href="shop.html" class="back-btn">← Terug</a>
            <h1>👟 Schoenen</h1>
        </div>

        <div class="empty-state">
            <div class="empty-state-icon">🚀</div>
            <p>Binnenkort beschikbaar!</p>
            <p>We zijn hard aan het werk om de beste sneakers in stock te brengen. Check binnenkort terug!</p>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Prins Resell. Alle rechten voorbehouden.</p>
    </footer>

</body>
</html>
