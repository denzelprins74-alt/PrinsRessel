<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - Prins Resell</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            color: #333;
            line-height: 1.6;
            background: #000;
            color: white;
        }

        /* NAVBAR */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            box-shadow: 0 2px 10px rgba(255, 215, 0, 0.2);
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            color: gold;
            letter-spacing: 3px;
            text-shadow: 0 0 10px gold;
            margin-right: auto;
            min-width: 150px;
            text-decoration: none;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 40px;
            align-items: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
            position: relative;
            padding: 5px 10px;
            border: 2px solid transparent;
        }

        nav a::after {
            content: "";
            position: absolute;
            width: 0;
            height: 2px;
            background: gold;
            bottom: -7px;
            left: 10px;
            transition: 0.3s;
        }

        nav a:hover {
            color: gold;
        }

        nav a:hover::after {
            width: calc(100% - 20px);
        }

        /* CONTENT */
        .container {
            margin-top: 100px;
            padding: 50px;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 40px;
            color: gold;
            text-align: center;
        }

        .coming-soon {
            text-align: center;
            padding: 60px 20px;
            font-size: 20px;
            opacity: 0.8;
        }

        .coming-soon p {
            margin: 20px 0;
        }

        /* FOOTER */
        footer {
            padding: 30px;
            text-align: center;
            color: gold;
            background: #000;
            border-top: 2px solid gold;
            margin-top: 100px;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            nav {
                flex-wrap: wrap;
                gap: 15px;
                padding: 15px 20px;
            }

            .logo {
                margin-right: 0;
                width: 100%;
                margin-bottom: 10px;
            }

            nav ul {
                width: 100%;
                gap: 20px;
                justify-content: center;
            }

            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">PRINS RESELL</a>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="shop.html">Shop</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <div class="container">
        <h1>🔥 Shop</h1>
        <div class="coming-soon">
            <p>De winkel wordt binnenkort geopend!</p>
            <p>Houd onze Instagram in de gaten voor updates.</p>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 Prins Resell. Alle rechten voorbehouden.</p>
    </footer>

</body>
</html>
