<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - Prins Resell</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #0a0e27;
            color: white;
            overflow-x: hidden;
        }

        /* NAVBAR */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 60px;
            background: rgba(10, 14, 39, 0.95);
            backdrop-filter: blur(20px);
            z-index: 1000;
            box-shadow: 0 8px 32px rgba(255, 215, 0, 0.15);
            border-bottom: 1px solid rgba(255, 215, 0, 0.2);
        }

        .logo {
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 4px;
            text-decoration: none;
            animation: glow 3s ease-in-out infinite;
            text-transform: uppercase;
            font-style: italic;
        }

        @keyframes glow {
            0%, 100% { filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.4)); }
            50% { filter: drop-shadow(0 0 25px rgba(255, 215, 0, 0.8)); }
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 50px;
            align-items: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: 600;
            position: relative;
            padding: 8px 0;
            font-size: 15px;
            letter-spacing: 1px;
            transition: 0.3s ease;
            text-transform: uppercase;
        }

        nav a::before {
            content: "";
            position: absolute;
            width: 0;
            height: 3px;
            background: linear-gradient(90deg, #FFD700, #FFA500);
            bottom: -5px;
            left: 0;
            transition: 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        nav a:hover {
            color: #FFD700;
        }

        nav a:hover::before {
            width: 100%;
        }

        /* CONTAINER */
        .container {
            margin-top: 150px;
            padding: 60px 40px;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
            min-height: calc(100vh - 150px);
        }

        h1 {
            font-size: 72px;
            font-weight: 900;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 60px;
            letter-spacing: 4px;
            text-transform: uppercase;
            animation: fadeInDown 1s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .coming-soon {
            text-align: center;
            padding: 80px 40px;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.05), rgba(255, 165, 0, 0.05));
            border: 2px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            animation: fadeIn 1s ease-out 0.3s both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .coming-soon p {
            font-size: 24px;
            margin: 30px 0;
            letter-spacing: 2px;
            font-weight: 600;
            color: #FFD700;
        }

        .coming-soon p:first-child {
            font-size: 32px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .coming-soon p:last-child {
            opacity: 0.8;
            font-size: 18px;
        }

        /* FOOTER */
        footer {
            padding: 40px;
            text-align: center;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 100%);
            border-top: 1px solid rgba(255, 215, 0, 0.2);
            margin-top: 100px;
        }

        footer p {
            font-size: 14px;
            color: #FFD700;
            letter-spacing: 2px;
            font-weight: 600;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            nav {
                flex-wrap: wrap;
                gap: 20px;
                padding: 15px 20px;
            }

            .logo {
                font-size: 18px;
                width: 100%;
            }

            nav ul {
                width: 100%;
                gap: 15px;
                justify-content: center;
            }

            nav a {
                font-size: 12px;
            }

            .container {
                margin-top: 120px;
                padding: 40px 20px;
            }

            h1 {
                font-size: 40px;
            }

            .coming-soon {
                padding: 50px 20px;
            }

            .coming-soon p {
                font-size: 18px;
            }

            .coming-soon p:first-child {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">Prins Resell</a>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="shop.html">Shop</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <div class="container">
        <h1>🔥 Shop</h1>
        <div class="coming-soon">
            <p>🚀 Coming Soon!</p>
            <p>De winkel wordt binnenkort geopend met exclusive sneakers & streetwear</p>
            <p>Houd onze Instagram in de gaten voor updates!</p>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 Prins Resell. Alle rechten voorbehouden.</p>
    </footer>

</body>
</html>
